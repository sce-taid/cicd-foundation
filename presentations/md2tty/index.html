<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive Markdown Presentation">
  <title>Presentation Slides</title>
  
  <!-- External Styles -->
  <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
  <main id="slide-container" aria-live="polite">
    <article id="render-target" class="slide-content">
      <p>Loading slides...</p>
    </article>
    <footer id="footer"></footer>
  </main>

  <!-- Shortcuts Help Overlay -->
  <aside id="shortcuts-overlay" aria-hidden="true" role="dialog" aria-labelledby="shortcuts-title">
    <div class="shortcuts-content"></div>
  </aside>

  <!-- Hidden element for auto-scaling measurements -->
  <div id="measure-container" aria-hidden="true" style="position: absolute; visibility: hidden; pointer-events: none; width: 1000px; font-family: var(--font-family);"></div>

  <!-- Application Logic -->
  <script type="module">
    import { Md2tty } from '/src/md2tty.js';
    const presentation = new Md2tty({
      target: '#render-target',
      manifestUrl: 'slides.json',
      slidesDir: 'slides/'
    });
    presentation.init();
  </script>
</body>
</html>
