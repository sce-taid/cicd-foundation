[Unit]
# Pull in desktop-specific services for the GNOME environment.
# Optional services will skip execution if their ConditionEnvironment is not met.
Wants=guacamole.service \
      guacd.service \
      gnome-setup.service \
      docker.service \
      tigervnc.service \
      chrome-remote-desktop-setup.service \
      ${DESKTOP_SERVICE}
